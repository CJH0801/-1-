<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>일본어 문자 연습</title>
<link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f0e8;font-family:'Noto Sans KR',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.brush{font-family:'Klee One',cursive}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes overlayIn{from{opacity:0}to{opacity:1}}
.fade{animation:fadeIn .35s ease both}.slide{animation:slideUp .3s ease both}
button{border:none;border-radius:10px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-weight:600;transition:all .15s}
button:active{transform:scale(.97)}
/* 반응형 레이아웃 */
#app{width:100%;max-width:480px}
@media(min-width:768px){
  body{padding:32px}
  #app{max-width:560px}
  .sys-grid{grid-template-columns:1fr 1fr;gap:20px}
  .sys-card{padding:28px 16px}
  .sys-card p.brush:first-child{font-size:52px!important}
  .overlay-card{max-width:400px;padding:36px 32px}
}
@media(max-width:400px){
  body{padding:10px}
  #app{max-width:100%}
  .sys-grid{gap:8px}
  .sys-card{padding:16px 8px}
  .sys-card p.brush:first-child{font-size:34px!important}
  .row-btn{padding:8px 10px;gap:7px}
  .overlay-card{padding:22px 16px}
}
.card{background:#fffcf8;border-radius:16px;box-shadow:0 4px 24px rgba(120,90,50,.08);overflow:hidden}
.row-btn{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;cursor:pointer;text-align:left;transition:all .15s;font-family:'Noto Sans KR',sans-serif;width:100%}
.row-btn.on{border:1.5px solid #3d3225;background:#faf6f0}
.row-btn.on.K{border-color:#1e4d7a;background:#f0f5fa}
.row-btn.off{border:1.5px solid #e0d6c8;background:#fff}
.chk{width:20px;height:20px;border-radius:4px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;flex-shrink:0}
.chk.on.H{background:#3d3225;border:none}.chk.on.K{background:#1e4d7a;border:none}.chk.off{background:#fff;border:1.5px solid #ccc}
.log-card{background:#fffcf8;border-radius:12px;border:1px solid #e8ddd0;padding:14px 16px;margin-bottom:8px}
.progress-track{height:3px;background:#ece4d8}
.progress-bar{height:100%;transition:width .3s ease;border-radius:0 2px 2px 0}
.answer-area{background:#f8f3ec;border-radius:12px;padding:18px;margin-bottom:20px}
.answer-char-row{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:8px}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#fff;border:1px solid #e8ddd0;border-radius:10px;margin-bottom:8px}
.toggle-label{font-size:13px;color:#5a4a3a}.toggle-sub{font-size:10px;color:#a09080}
.toggle-track{position:relative;width:40px;height:22px;background:#ccc;border-radius:11px;cursor:pointer;transition:background .2s;flex-shrink:0}
.toggle-track.on{background:#3d3225}
.toggle-thumb{position:absolute;top:2px;left:2px;width:18px;height:18px;background:#fff;border-radius:50%;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.toggle-track.on .toggle-thumb{left:20px}
.stroke-box{display:flex;align-items:center;justify-content:center;background:#fff;border-radius:10px;border:1px solid #e8ddd0;width:150px;height:150px;overflow:hidden;flex-shrink:0}
.stroke-legend{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;justify-content:center}
.stroke-legend span{font-size:11px;display:flex;align-items:center;gap:3px}
.stroke-legend i{width:12px;height:3px;border-radius:2px;display:inline-block}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(40,30,20,.55);display:flex;align-items:center;justify-content:center;z-index:100;animation:overlayIn .2s ease both;padding:16px}
.overlay-card{background:#fffcf8;border-radius:16px;padding:28px 24px;width:100%;max-width:340px;box-shadow:0 8px 32px rgba(40,30,20,.2)}
.test-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #f0e8dc}
.settings-btn{width:32px;height:32px;border-radius:50%;background:rgba(61,50,37,.06);display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid #e8ddd0;padding:0;transition:all .15s;flex-shrink:0}
.settings-btn:hover{background:rgba(61,50,37,.12)}
.settings-btn svg{width:18px;height:18px}
.nav-row{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:16px}
.nav-btn{width:36px;height:36px;border-radius:50%;background:#fff;border:1px solid #e0d6c8;display:flex;align-items:center;justify-content:center;font-size:16px;color:#8a7a66;cursor:pointer;padding:0;transition:all .15s}
.nav-btn:hover{background:#f5f0e8}.nav-btn:disabled{opacity:.3;cursor:default}
.dot-row{display:flex;gap:4px;align-items:center;flex-wrap:wrap;justify-content:center;max-width:280px}
.dot{width:8px;height:8px;border-radius:50%;cursor:pointer;transition:all .15s;flex-shrink:0}
.dot.empty{background:#e0d6c8}.dot.correct{background:#2d8a4e}.dot.wrong{background:#c0392b}.dot.current{transform:scale(1.4);box-shadow:0 0 0 2px #3d3225}
.mode-tabs{display:flex;border-radius:10px;overflow:hidden;border:1.5px solid #3d3225;margin-bottom:16px}
.mode-tabs.K{border-color:#1e4d7a}
.mode-tab{flex:1;padding:10px;font-size:13px;text-align:center;cursor:pointer;transition:all .15s;background:#fff;color:#3d3225;border:none;font-family:'Noto Sans KR',sans-serif;font-weight:600}
.mode-tab.K{color:#1e4d7a}
.mode-tab.active.H{background:#3d3225;color:#fff}
.mode-tab.active.K{background:#1e4d7a;color:#fff}
.speak-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:20px;background:#fff;border:1px solid #e0d6c8;color:#5a4a3a;font-size:12px;cursor:pointer;font-weight:500;margin-top:8px;transition:all .15s;font-family:'Noto Sans KR',sans-serif}
.speak-btn:hover{background:#f5f0e8;border-color:#c4a882}
.review-badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;margin-left:6px}
.review-badge.correct{background:#e8f5e9;color:#2d8a4e}
.review-badge.wrong{background:#fde8e8;color:#c0392b}
/* 시스템 선택 카드 */
.sys-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.sys-card{background:#fffcf8;border-radius:14px;border:2px solid #e0d6c8;padding:22px 12px;text-align:center;cursor:pointer;transition:all .2s;box-shadow:0 2px 8px rgba(120,90,50,.06)}
.sys-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(120,90,50,.14)}
.sys-card.H:hover{border-color:#3d3225;background:#faf6f0}
.sys-card.K:hover{border-color:#1e4d7a;background:#f0f5fa}
/* 섹션 구분자 */
.sec-div{display:flex;align-items:center;gap:10px;margin:14px 0 7px;color:#8a7a66;font-size:11px;font-weight:700;letter-spacing:.5px}
.sec-div::before,.sec-div::after{content:'';flex:1;height:1px;background:#e0d6c8}
/* 시스템 뱃지 */
.sys-badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:8px;font-weight:700;vertical-align:middle;margin-right:4px}
.sys-badge.H{background:#faf0e0;color:#5a3c1a}
.sys-badge.K{background:#ddeeff;color:#1e4d7a}
/* 요음 복합 안내 */
.compound-box{display:flex;flex-direction:column;align-items:center;justify-content:center;background:#f8f3ec;border-radius:10px;border:1px solid #e8ddd0;width:150px;height:150px;flex-shrink:0}
</style>
</head>

// TTS
function speak(ch){
  if(!('speechSynthesis' in window))return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(ch.c);
  u.lang='ja-JP';u.rate=0.7;u.pitch=1;
  const voices=window.speechSynthesis.getVoices();
  const ja=voices.find(v=>v.lang.startsWith('ja'));
  if(ja)u.voice=ja;
  window.speechSynthesis.speak(u);
}
if('speechSynthesis' in window){speechSynthesis.getVoices();speechSynthesis.onvoiceschanged=()=>{speechSynthesis.getVoices()}}

// KanjiVG SVG stroke
let svgC={};
async function fetchSVG(ch){
  if(!ch.u)return null;
  const code="0"+ch.u;if(svgC[code])return svgC[code];
  try{const r=await fetch(`https://raw.githubusercontent.com/KanjiVG/kanjivg/master/kanji/${code}.svg`,{signal:AbortSignal.timeout(5000)});
  if(!r.ok)throw 0;const t=await r.text();svgC[code]=t;return t}catch{return null}
}
function drawSVG(svgT,tid){
  const box=document.getElementById(tid);if(!box)return;
  if(!svgT){box.innerHTML='<span style="font-size:11px;color:#c0a0a0;text-align:center;line-height:1.4;padding:8px">오프라인<br>불러오기 불가</span>';return}
  const p=new DOMParser(),doc=p.parseFromString(svgT,"image/svg+xml"),svg=doc.querySelector("svg");
  if(!svg){box.innerHTML='<span style="font-size:11px;color:#c0a0a0">오류</span>';return}
  svg.setAttribute("viewBox","0 0 109 109");svg.removeAttribute("width");svg.removeAttribute("height");
  svg.style.width="130px";svg.style.height="130px";
  const ns="http://www.w3.org/2000/svg",g=doc.createElementNS(ns,"g");
  [["54.5","0","54.5","109"],["0","54.5","109","54.5"]].forEach(([x1,y1,x2,y2])=>{
    const l=doc.createElementNS(ns,"line");l.setAttribute("x1",x1);l.setAttribute("y1",y1);
    l.setAttribute("x2",x2);l.setAttribute("y2",y2);l.setAttribute("stroke","#e0d6c8");
    l.setAttribute("stroke-width","0.5");l.setAttribute("stroke-dasharray","3,3");g.appendChild(l)});
  svg.insertBefore(g,svg.firstChild);
  const paths=[];svg.querySelectorAll("path[id]").forEach(p=>{if((p.getAttribute("id")||"").match(/-s\d+$/))paths.push(p)});
  paths.forEach((p,i)=>{
    const color=SC[i%SC.length];p.setAttribute("stroke",color);p.setAttribute("stroke-width","4");
    p.setAttribute("stroke-linecap","round");p.setAttribute("stroke-linejoin","round");p.setAttribute("fill","none");p.style.opacity="0.85";
    const m=(p.getAttribute("d")||"").match(/^[Mm]\s*([\d.]+)[,\s]+([\d.]+)/);
    if(m){const cx=parseFloat(m[1]),cy=parseFloat(m[2]);
      const ci=doc.createElementNS(ns,"circle");ci.setAttribute("cx",cx);ci.setAttribute("cy",cy);
      ci.setAttribute("r","6");ci.setAttribute("fill",color);ci.setAttribute("opacity","0.9");
      const tx=doc.createElementNS(ns,"text");tx.setAttribute("x",cx);tx.setAttribute("y",String(cy+1));
      tx.setAttribute("text-anchor","middle");tx.setAttribute("dominant-baseline","central");
      tx.setAttribute("fill","#fff");tx.setAttribute("font-size","8");tx.setAttribute("font-weight","700");
      tx.setAttribute("font-family","sans-serif");tx.textContent=String(i+1);svg.appendChild(ci);svg.appendChild(tx)}});
  let legend='<div class="stroke-legend">';
  paths.forEach((_,i)=>{legend+=`<span><i style="background:${SC[i%SC.length]}"></i>${i+1}획</span>`});legend+='</div>';
  box.innerHTML="";box.appendChild(svg);
  const la=document.getElementById("stroke-legend-area");if(la)la.innerHTML=legend;
}

// ======================== ACTIONS ========================
function go(scr){S.screen=scr;S.paused=false;render()}
function setMode(m){S.mode=m;render()}

function pickSystem(sys){
  S.system=sys;
  S.sel=new Set(); // 기본 전체 해제
  S.screen="select";render()
}

function toggleRow(i){S.sel.has(i)?S.sel.delete(i):S.sel.add(i);render()}
function toggleStroke(){S.strokeOn=!S.strokeOn;localStorage.setItem(SKEY,S.strokeOn);render()}
function openPause(){S.paused=true;render()}
function closePause(){S.paused=false;render()}

function backToSelect(){
  const wrongChars=S.deck.filter((_,i)=>S.answers[i]==='wrong');
  if(wrongChars.length>0){
    const log={id:Date.now(),sys:S.system,date:new Date().toLocaleString("ko-KR"),
      label:S.testLabel+" (중단)",chars:wrongChars.map(c=>c.r),display:wrongChars.map(c=>c.c)};
    S.logs=saveLogs([...S.logs,log])
  }
  S.paused=false;S.screen="select";render()
}

function quitTest(){
  const wrongChars=S.deck.filter((_,i)=>S.answers[i]==='wrong');
  if(wrongChars.length>0){
    const log={id:Date.now(),sys:S.system,date:new Date().toLocaleString("ko-KR"),
      label:S.testLabel+" (중단)",chars:wrongChars.map(c=>c.r),display:wrongChars.map(c=>c.c)};
    S.logs=saveLogs([...S.logs,log])
  }
  S.paused=false;S.screen="title";render()
}

function toggleSelAll(){
  const items=rowItems();
  const allOn=items.every((_,i)=>S.sel.has(i));
  if(allOn){S.sel=new Set()}else{S.sel=new Set(items.map((_,i)=>i))}
  render()
}

function startTest(chars,label,isRandom){
  S.deck=isRandom?shuffle(chars):[...chars];
  S.idx=0;S.revealed=false;
  S.answers=new Array(chars.length).fill(null);
  S.testLabel=label;S.screen="test";S.paused=false;S.orderPopup=false;render()
}

function startFromSel(){
  const items=rowItems(),data=curData();
  const chars=items.filter((_,i)=>S.sel.has(i)).flatMap(r=>r.idx.map(j=>data[j]));
  if(!chars.length)return;
  const label=items.filter((_,i)=>S.sel.has(i)).map(r=>r.label).join(", ");
  S.pendingChars=chars;S.pendingLabel=label;
  S.orderPopup=true;render()
}

function closeOrderPopup(){S.orderPopup=false;render()}

function confirmOrder(isRandom){
  if(!S.pendingChars)return;
  startTest(S.pendingChars,S.pendingLabel,isRandom);
  S.pendingChars=null;S.pendingLabel="";
}

function startLog(id){
  const log=S.logs.find(l=>l.id===id);if(!log)return;
  S.system=log.sys||"H";
  const data=curData();
  const chars=log.chars.map(r=>data.find(d=>d.r===r)).filter(Boolean);
  if(!chars.length)return;
  startTest(chars,"오답 복습",true)
}

function retryWrong(){
  startTest(S.deck.filter((_,i)=>S.answers[i]==='wrong'),"오답 재시험",true)
}

function reveal(){S.revealed=true;render()}

function judge(ok){
  S.answers[S.idx]=ok?'correct':'wrong';
  S.revealed=false;
  const total=S.deck.length;
  let next=-1;
  for(let i=S.idx+1;i<total;i++){if(S.answers[i]===null){next=i;break}}
  if(next===-1){for(let i=0;i<S.idx;i++){if(S.answers[i]===null){next=i;break}}}
  if(next!==-1)S.idx=next;
  render()
}

function finishTest(){
  const wrongChars=S.deck.filter((_,i)=>S.answers[i]==='wrong');
  if(wrongChars.length>0){
    const log={id:Date.now(),sys:S.system,date:new Date().toLocaleString("ko-KR"),
      label:S.testLabel,chars:wrongChars.map(c=>c.r),display:wrongChars.map(c=>c.c)};
    S.logs=saveLogs([...S.logs,log])
  }
  S.screen="result";render()
}

function navPrev(){if(S.idx>0){S.idx--;S.revealed=false;render()}}
function navNext(){if(S.idx<S.deck.length-1){S.idx++;S.revealed=false;render()}}
function jumpTo(i){S.idx=i;S.revealed=false;render()}
function delLog(id){S.logs=saveLogs(S.logs.filter(l=>l.id!==id));render()}

render();
</script>
</body>
